<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FhETCH HMIS</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/css/app.css">

    <script type="module" src="/js/app.js" defer></script>

</head>

<body>

    <!-- ==========================================
         TOP NAVIGATION
    =========================================== -->

    <header class="topbar">

        <div class="brand">

            <img src="/assets/FhETCH.png" alt="FhETCH Logo">

            <div>

                <h2>FhETCH HMIS</h2>

                <small>Hospital Management Information System</small>

            </div>

        </div>

        <div class="topbar-center">

            <span id="hospital-name">
                Hospital
            </span>

        </div>

        <div class="user-menu">

            <span id="current-user">

                Dr. Brian Ngesa

            </span>

            <span id="current-role">

                Doctor

            </span>

            <button id="logout-btn">

                Logout

            </button>

        </div>

    </header>

    <!-- ==========================================
         APPLICATION LAYOUT
    =========================================== -->

    <div class="layout">

        <!-- Sidebar -->

        <aside class="sidebar">

            <nav id="sidebar-menu">

                <!-- Generated according to role -->

            </nav>
                    <button id="help-btn">
            ❓ Help
        </button>

        <button id="settings-btn">
            ⚙ Settings
        </button>
        </aside>

        <!-- Dynamic Pages -->

        <main id="app">

            <!-- Router injects pages here -->

        </main>

    </div>

    <!-- ==========================================
         FLOATING STAFF MESSENGER
    =========================================== -->

    <button id="chat-btn" class="chat-btn">

        💬

    </button>

    <!-- ==========================================
         STAFF CHAT PANEL
    =========================================== -->

    <aside id="chat-panel" class="chat-panel hidden">

        <!-- Header -->

        <div class="chat-header">

            <div>

                <h3>Staff Messenger</h3>

                <small>
                    Search staff by ID or name
                </small>

            </div>

            <button id="close-chat">

                ✕

            </button>

        </div>

        <!-- Search -->

        <div class="chat-search">

            <input
                type="text"
                id="staff-search"
                placeholder="Search Staff ID or Name...">

        </div>

        <!-- Recent Chats -->

        <div class="chat-list">

            <div class="chat-item">

                <div>

                    <strong>DOC-001</strong>

                    <small>Dr. James Otieno</small>

                </div>

                <span class="badge">

                    2

                </span>

            </div>

            <div class="chat-item">

                <div>

                    <strong>LAB-003</strong>

                    <small>Peter Mwangi</small>

                </div>

            </div>

            <div class="chat-item">

                <div>

                    <strong>PHA-002</strong>

                    <small>Rose Wanjiru</small>

                </div>

            </div>

            <div class="chat-item">

                <div>

                    <strong>REC-001</strong>

                    <small>Mary Njeri</small>

                </div>

            </div>

        </div>

    </aside>

</body>

</html>
